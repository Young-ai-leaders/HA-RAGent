name: Release
on:
  release:
    types:
      - published
      
jobs:
  release_zip_file:
    name: Run automations to build latest release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if it exists
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' '${{ github.workspace }}/custom_components/ha_ragent/manifest.json'

      - name: Copy and Zip
        if: ${{ github.event_name == 'release' }}
        run: |
          cd '${{ github.workspace }}/custom_components/ha_ragent'
          zip ha_ragent.zip -r ./

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2.5.0
        if: ${{ github.event_name == 'release' }}
        with:
          files: "${{ github.workspace }}/custom_components/ha_ragent/ha_ragent.zip"